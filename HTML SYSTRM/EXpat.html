<!DOCTYPE html>
<html>
<head>
<title>EliteDrive Car Rental</title>





<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#333;
padding:10px;
text-align:center;
}

nav button{
margin:5px;
padding:10px;
cursor:pointer;
}

.container{
width:90%;
margin:auto;
padding:20px;
}

.car-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.car{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

button{
padding:8px 12px;
cursor:pointer;
}

.hidden{
display:none;
}

#loginBox{
max-width:300px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:8px;
margin:8px 0;
}

.adminPanel{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

</style>





 



</head>

<body>

<header>
<h1>EliteDrive Car Rental</h1>
</header>

<!-- LOGIN -->

<div id="loginBox">

<h3>Login</h3>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>Admin: admin / 1234</p>

</div>

<!-- MAIN SITE -->

<div id="mainSite" class="hidden">

<nav>

<button onclick="filterCars('all')">All</button>
<button onclick="filterCars('auto')">Auto</button>
<button onclick="filterCars('suv')">SUV</button>
<button onclick="filterCars('van')">Van</button>
<button onclick="filterCars('pickup')">Pickup</button>

</nav>

<div class="container">

<h2>Available Cars</h2>

<div class="car-grid" id="carList">

<div class="car" data-type="auto">
<h3>Toyota Vios</h3>
<p>Automatic Sedan</p>
<p>₱1500/day</p>
<button onclick="bookCar('Toyota Vios')">Book</button>
</div>

<div class="car" data-type="suv">
<h3>Honda CRV</h3>
<p>SUV</p>
<p>₱2800/day</p>
<button onclick="bookCar('Honda CRV')">Book</button>
</div>

<div class="car" data-type="pickup">
<h3>Ford Ranger</h3>
<p>Pickup Truck</p>
<p>₱2500/day</p>
<button onclick="bookCar('Ford Ranger')">Book</button>
</div>

<div class="car" data-type="van">
<h3>Toyota Hiace</h3>
<p>Passenger Van</p>
<p>₱3200/day</p>
<button onclick="bookCar('Toyota Hiace')">Book</button>
</div>

</div>


<h2>Booking Form</h2>

<div>

<input id="customerName" placeholder="Your Name">

<select id="carSelect">
<option>Toyota Vios</option>
<option>Honda CRV</option>
<option>Ford Ranger</option>
<option>Toyota Hiace</option>
</select>>

<input type="date" id="pickup">

<input type="date" id="return">

<button onclick="confirmBooking()">Confirm Booking</button>

</div>


<!-- ADMIN PANEL -->

<div id="adminPanel" class="adminPanel hidden">

<h2>Admin Panel - Add Car</h2>

<input id="carName" placeholder="Car Name">

<select id="carType">

<option value="auto">Auto</option>
<option value="suv">SUV</option>
<option value="van">Van</option>
<option value="pickup">Pickup</option>

</select>

<input id="carPrice" placeholder="Price per day">

<button onclick="addCar()">Add Car</button>

</div>

</div>

</div>











<script>

/* LOGIN SYSTEM */

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user==="admin" && pass==="1234"){

document.getElementById("loginBox").style.display="none"
document.getElementById("mainSite").classList.remove("hidden")
document.getElementById("adminPanel").classList.remove("hidden")

}

else if(user!==""){

document.getElementById("loginBox").style.display="none"
document.getElementById("mainSite").classList.remove("hidden")

}

else{

alert("Invalid Login")

}

}


/* FILTER CARS */

function filterCars(type){

let cars=document.querySelectorAll(".car")

cars.forEach(car=>{

if(type==="all"){
car.style.display="block"
}

else if(car.dataset.type===type){
car.style.display="block"
}

else{
car.style.display="none"
}

})

}


/* BOOK BUTTON */

function bookCar(car){

document.getElementById("carSelect").value=car

}


/* BOOKING SYSTEM */

function confirmBooking(){

let name=document.getElementById("customerName").value
let car=document.getElementById("carSelect").value

if(name===""){

alert("Please enter your name")

return

}

alert("Booking Confirmed!\nCustomer: "+name+"\nCar: "+car)

}


/* ADMIN ADD CAR */

function addCar(){

let name=document.getElementById("carName").value
let type=document.getElementById("carType").value
let price=document.getElementById("carPrice").value

let newCar=document.createElement("div")

newCar.className="car"
newCar.dataset.type=type

newCar.innerHTML=`

<h3>${name}</h3>
<p>${type}</p>
<p>₱${price}/day</p>
<button onclick="bookCar('${name}')">Book</button>

`

document.getElementById("carList").appendChild(newCar)

alert("Car Added!")

}

</script>

</body>
</html>
